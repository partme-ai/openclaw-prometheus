# Continuous integration: install, typecheck, build, test, upload dist artifact.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts&&p.scripts.typecheck?0:1)"; then
            pnpm run typecheck
          else
            echo "::notice::No typecheck script; skipping."
          fi

      - name: Build
        run: pnpm run build

      - name: Test
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts&&p.scripts.test?0:1)"; then
            pnpm test
          else
            echo "::notice::No test script; skipping."
          fi

      - name: Upload build artifact (dist)
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-prometheus-dist
          path: dist/
          if-no-files-found: error
